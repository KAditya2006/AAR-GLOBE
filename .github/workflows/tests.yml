name: Backend API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: project/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: project/backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test_secret
          ADMIN_EMAIL: admin@test.local
          ADMIN_PASSWORD: Admin1234
          # mongodb-memory-server downloads a MongoDB binary during test setup.
          # CI runners need outbound access to fastdl.mongodb.org or a preconfigured binary cache.
          MONGOMS_DOWNLOAD_DIR: ${{ runner.temp }}/mongodb-binaries
